description = """
Worker formula — ephemeral per-bead task execution.

Receives task context via environment variables and a mounted task file
(bead description, acceptance criteria, judge notes from prior attempts).
Runs in an isolated git worktree, uses wrapix-agent for implementation,
commits results, and exits. The container exit signals completion to gc
convergence.

## Context

Pins docs/README.md always. Task file is mounted at /workspace/.task.

## Variables

| Variable | Source | Description |
|----------|--------|-------------|
| issue | gc sling | The work bead ID assigned to this worker |
| base_branch | bead metadata | Base branch to branch from (default: main) |
"""
formula = "wrapix-worker"
version = 1

[vars]
[vars.issue]
description = "The work bead ID assigned to this worker"
required = true

[vars.base_branch]
description = "Base branch for the worktree"
default = "main"

[[steps]]
id = "load-context"
title = "Load task context"
description = """
Read the task assignment from environment and mounted files.

**1. Read pinned context:**

Read `docs/README.md` for project overview.

**2. Read task file:**

The provider script mounts the task file at `/workspace/.task` containing:
- Bead description
- Acceptance criteria
- Reviewer notes from prior attempts (if this is a retry)

```bash
cat /workspace/.task
```

**3. Understand the assignment:**
- What exactly needs to be done?
- If this is a retry: read judge rejection notes carefully
- What files are likely involved?
- What does "done" look like?

**Exit criteria:** Task understood, ready to implement."""

[[steps]]
id = "implement"
title = "Implement the fix"
needs = ["load-context"]
description = """
Execute the task using wrapix-agent conventions.

**1. Implement the solution:**

Follow existing codebase conventions. Make atomic, focused commits:
```bash
git add <files>
git commit -m "<type>: <description> ($GC_BEAD_ID)"
```

If this is a retry after judge rejection: focus on fixing the specific
issues noted in the rejection, not redoing everything.

**2. Stay scoped:**

Only fix what the bead describes. If you discover related issues:
- Note them in the commit message or bead notes
- Do NOT fix unrelated issues in this worktree

**3. If stuck:**

The worker has no bd access and cannot create beads. If blocked, write
a clear description of the problem to stdout (captured by podman logs)
and exit non-zero. The provider script will handle escalation.

**Exit criteria:** All changes committed to the worktree branch."""

[[steps]]
id = "self-review"
title = "Verify changes before exit"
needs = ["implement"]
description = """
Review the diff and verify the fix addresses the task.

**1. Review changes:**
```bash
git diff origin/{{base_branch}}...HEAD
git log --oneline origin/{{base_branch}}..HEAD
```

Check for: bugs, security issues, debug cruft, unintended changes.
Fix anything found.

**2. Ensure everything is committed:**
```bash
git status
```
Working tree must be clean. If uncommitted changes exist:
```bash
git add -A && git commit -m "chore: capture remaining work ($GC_BEAD_ID)"
```

**3. Exit cleanly:**

The container exit signals worker completion to gc convergence. The
gate condition script detects the exit, computes the commit range,
and sets bead metadata (commit_range, branch_name) for the judge.

**Exit criteria:** All changes committed, working tree clean, exit 0."""
