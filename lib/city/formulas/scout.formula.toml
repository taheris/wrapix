description = """
Scout patrol loop — watches service containers for errors and creates beads.

Persistent session, poked by gc orders on a configurable interval. Scans
podman logs for error patterns (immediate and batched), deduplicates against
existing beads, and respects the maxBeads cap before pausing creation. The
entrypoint wrapper also pushes events via `gc nudge` on container lifecycle
events (die, oom, restart).

Each wisp is ONE patrol iteration: check services, scan logs, create beads
if needed, pour next iteration. On crash, re-read formula steps and resume
from context (bead state, container state).

## Context

Pins docs/README.md always. Loads docs/orchestration.md on demand for
scout rules (immediate/batched/ignore patterns).

## Variables

| Variable | Source | Description |
|----------|--------|-------------|
| poll_interval | city config | Polling interval for orders (default: 5m) |
| max_beads | city config | Cap on open beads before pausing (default: 10) |
"""
formula = "wrapix-scout"
version = 1

[vars]
[vars.poll_interval]
description = "Polling interval for gc orders (e.g., 5m, 10m)"
default = "5m"

[vars.max_beads]
description = "Maximum open beads before scout pauses creation"
default = "10"

[[steps]]
id = "load-context"
title = "Load context and check capacity"
description = """
**1. Prime environment:**
```bash
gc prime
bd prime
```

**2. Read pinned context:**

Read `docs/README.md` for project overview.
Read `docs/orchestration.md` if it exists — look for `## Scout Rules` to
load custom patterns. If the section is missing, use defaults:
- Immediate: `FATAL|PANIC|panic:`
- Batched: `ERROR|Exception`
- Ignore: (none)

**3. Check bead cap:**
```bash
OPEN_COUNT=$(bd list --status=open --status=in_progress --json --limit=0 | jq 'length')
```

If OPEN_COUNT >= {{max_beads}}:
- Notify director that the cap is reached:
  ```bash
  wrapix-notifyd "Scout paused: {{max_beads}} open beads reached"
  ```
- Skip to next-iteration (do not scan or create beads)

**4. Check inbox for director requests:**
```bash
gc mail inbox
```

Handle `investigate` messages: note the request, scan for it during
the service check step. Archive after reading.

**Exit criteria:** Context loaded, patterns known, capacity confirmed."""

[[steps]]
id = "scan-services"
title = "Scan service containers for errors"
needs = ["load-context"]
description = """
Scan all service containers for error patterns.

**1. List service containers:**
```bash
podman ps --filter "label=gc-city=$GC_CITY_NAME" \
  --filter "label=gc-role=service" --format '{{.Names}}'
```

**2. For each service container, pull recent logs:**
```bash
podman logs --since {{poll_interval}} --tail 1000 "$CONTAINER" 2>&1
```

**3. Match against patterns:**

Load patterns from docs/orchestration.md `## Scout Rules`, or use defaults.

For each log line:
- Check **ignore** patterns first — skip matching lines
- Check **immediate** patterns (e.g., `FATAL|PANIC|panic:`) — collect for P0 beads
- Check **batched** patterns (e.g., `ERROR|Exception`) — collect, group by pattern

Also handle any director investigation requests from inbox by scanning
for the requested keywords.

**4. Check container health:**
```bash
podman inspect --format '{{.State.Status}}' "$CONTAINER"
```
Flag containers that are not running (exited, dead, restarting).

**Exit criteria:** Error list compiled, grouped by severity and pattern."""

[[steps]]
id = "create-beads"
title = "Create beads for detected errors"
needs = ["scan-services"]
description = """
Create beads for errors found during scan, with deduplication.

**1. Check existing beads for deduplication:**
```bash
bd list --status=open --status=in_progress --json --limit=0
```

For each error pattern found:
- Search existing beads for matching title/description
- If a matching bead exists: append new occurrences to its notes
  ```bash
  bd update <bead-id> --notes "$(date -u +%FT%TZ): additional occurrence in $CONTAINER"
  ```
- If no match: create a new bead

**2. Create beads by severity:**

**Immediate patterns (P0):**
```bash
bd create --title="FATAL: $PATTERN in $CONTAINER" \
  --description="$ERROR_DETAILS" \
  --type=bug --priority=0
```

**Batched patterns (P2):**
Group by unique pattern, one bead per pattern:
```bash
bd create --title="Error: $PATTERN in $CONTAINER" \
  --description="$GROUPED_DETAILS" \
  --type=bug --priority=2
```

**Container health issues (P1):**
```bash
bd create --title="Container unhealthy: $CONTAINER ($STATUS)" \
  --description="$HEALTH_DETAILS" \
  --type=bug --priority=1
```

**3. Re-check cap after each creation:**
```bash
OPEN_COUNT=$(bd list --status=open --status=in_progress --json --limit=0 | jq 'length')
```
Stop creating beads if OPEN_COUNT >= {{max_beads}}.

**Exit criteria:** All detected errors have corresponding beads, or cap reached."""

[[steps]]
id = "next-iteration"
title = "Pour next iteration and wait"
needs = ["create-beads"]
description = """
End of patrol cycle. Pour the next iteration for the gc order to trigger.

**1. Context check:**
If context feels heavy or RSS is high:
```bash
gc runtime request-restart
```

**2. Pour next iteration:**
```bash
NEXT=$(bd mol wisp wrapix-scout --root-only --json | jq -r '.new_epic_id')
bd update "$NEXT" --assignee=$GC_AGENT
```

**3. Burn this wisp:**
```bash
bd mol burn <this-wisp-id> --force
```

The gc order will trigger the next cycle after {{poll_interval}}.

**Exit criteria:** Next wisp poured, this wisp burned."""
